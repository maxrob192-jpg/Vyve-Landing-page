  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }

    // Page metadata — the document was just replaced, so set these on the live
    // (rendered) document rather than the static head, which is now discarded.
    document.title = "Vyve Psychotherapy — Therapy that doesn't last forever";
    var head = document.head || document.getElementsByTagName('head')[0];
    if (head) {
      if (!document.querySelector('meta[name="description"]')) {
        var desc = document.createElement('meta');
        desc.name = 'description';
        desc.content = "Vyve Psychotherapy — real, licensed therapists and measurable progress. In-person and virtual counselling at our Moncton and Richibucto, NB offices.";
        head.appendChild(desc);
      }
      if (!document.querySelector('link[rel="icon"]')) {
        var fav = document.createElement('link');
        fav.rel = 'icon';
        fav.type = 'image/svg+xml';
        fav.href = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%2308132E'/%3E%3Ccircle cx='50' cy='50' r='26' fill='none' stroke='%23B65100' stroke-width='7'/%3E%3Cellipse cx='50' cy='50' rx='13' ry='26' fill='none' stroke='%23FAAC6F' stroke-width='6' transform='rotate(-22 50 50)'/%3E%3C/svg%3E";
        head.appendChild(fav);
      }
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  <script type="__bundler/template">
"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"2078e90b-2216-42c0-9387-ed16d26eea05\"><\u002Fscript>\n<\u002Fhead>\n<body>\n<x-dc>\n<helmet>\n  <style>/* ============================================================\n   Vyve Psychotherapy — Webfonts\n   Red Hat Display (variable, 300–900) — UI + display\n   Cormorant Infant (variable, 300–700) — serif accent keywords\n   ============================================================ */\n\n@font-face {\n  font-family: \"Red Hat Display\";\n  src: url(\"54c4169f-9d3d-4951-88d5-1e437333071f\") format(\"truetype-variations\");\n  font-weight: 300 900;\n  font-style: normal;\n  font-display: swap;\n}\n\n@font-face {\n  font-family: \"Red Hat Display\";\n  src: url(\"991e84a8-c052-42cd-b6f2-3ecb74a84d0c\") format(\"truetype-variations\");\n  font-weight: 300 900;\n  font-style: italic;\n  font-display: swap;\n}\n\n@font-face {\n  font-family: \"Cormorant Infant\";\n  src: url(\"c6f98466-0245-4c12-9648-30028e8228c3\") format(\"truetype-variations\");\n  font-weight: 300 700;\n  font-style: normal;\n  font-display: swap;\n}\n\n@font-face {\n  font-family: \"Cormorant Infant\";\n  src: url(\"aad0cd59-e048-48df-af10-055b7c7b60e3\") format(\"truetype-variations\");\n  font-weight: 300 700;\n  font-style: italic;\n  font-display: swap;\n}\n<\u002Fstyle>\n  <style>/* ============================================================\n   Vyve Psychotherapy — Color Tokens\n   Warm cognac + deep navy. Cream paper, peach accents.\n   Brand orange is exactly #B65100.\n   ============================================================ */\n\n:root {\n  /* ---- Brand: Cognac / Orange ---- */\n  --vyve-orange:        #B65100;  /* primary brand mark, accent fills, links */\n  --vyve-orange-600:    #9E551F;  /* warm amber — primary text on cream */\n  --vyve-orange-400:    #DD7727;  /* lighter accent variant */\n  --vyve-peach:         #FAAC6F;  /* headline keyword highlight on dark */\n  --vyve-peach-tint:    #FFE6C2;  /* soft peach wash */\n  --vyve-cream-peach:   #FFDDC2;  /* warm peach surface */\n\n  /* ---- Brand: Navy / Ink ---- */\n  --vyve-navy:          #17294D;  /* primary navy — CTAs, ink on cream */\n  --vyve-navy-ink:      #1C2533;  /* logo ink, darkest text */\n  --vyve-navy-deep:     #08132E;  /* deep navy — dark page background base */\n  --vyve-navy-900:      #041B32;  /* darkest surface */\n  --vyve-teal:          #1A4564;  /* nav hover / active background */\n  --vyve-blue:          #18689E;  /* therapy chips, info accents */\n  --vyve-blue-mid:      #2E7BAF;  /* mid blue */\n\n  /* ---- Neutrals: Warm paper ---- */\n  --vyve-cream:         #FAF6F2;  /* site background, paper */\n  --vyve-sand:          #ECE3D9;  /* warm sand — card / surface light */\n  --vyve-steel:         #ACC1CD;  /* steel blue — secondary fills */\n  --vyve-pale-blue:     #C7D3D5;  /* pale blue-grey */\n  --vyve-grey:          #BEC3C5;  /* cool grey — footer/muted text */\n  --vyve-slate:         #677E82;  /* slate — muted on dark */\n  --vyve-slate-dark:    #455457;  /* dark slate */\n  --vyve-near-black:    #222B2B;  /* near black */\n  --vyve-white:         #FFFFFF;\n\n  /* ============================================================\n     Semantic aliases — prefer these in components\n     ============================================================ */\n\n  /* Surfaces */\n  --surface-page:        var(--vyve-cream);     /* default light page */\n  --surface-page-dark:   var(--vyve-navy-deep); /* dark hero/section base */\n  --surface-card:        var(--vyve-white);     /* card on cream */\n  --surface-card-warm:   var(--vyve-sand);      /* warm card / panel */\n  --surface-card-dark:   rgba(255,255,255,0.06);/* glass card on dark */\n  --surface-raised:      var(--vyve-cream-peach);\n\n  /* Text on light */\n  --text-heading:        var(--vyve-navy);\n  --text-body:           var(--vyve-navy-ink);\n  --text-muted: ace-2:  8px;\n  --space-3:  12px;\n  --space-4:  16px;\n  --space-5:  24px;\n  --space-6:  32px;\n  --space-7:  40px;\n  --space-8:  56px;\n  --space-9:  72px;\n  --space-10: 96px;\n  --space-11: 128px;\n\n  /* Component padding */\n  --pad-button:   10px 22px;   /* pill CTA */\n  --pad-button-sm: 6px 18px;\n  --pad-chip:     8px 14px;\n  --pad-card:     24px;\n  --pad-input:    12px 16px;\n\n  /* Section padding */\n  --section-y:    96px;\n  --section-y-sm: 56px;\n  --section-x:    72px;\n  --section-x-sm: 24px;\n\n  /* Layout */\n  --site-width:   1120px;  /* content column */\n  --content-narrow: 720px; /* prose measure */\n  --nav-height:   90px;\n}\n\n/* ============================================================\n   Vyve Psychotherapy — Effects: radii, shadows, motion, texture\n   Soft warm shadows; pill buttons; gentle 0.4s color fades.\n   ============================================================ */\n\n:root {\n  /* Corner radii */\n  --radius-sm:   8px;\n  --radius-md:   12px;\n  --radius-lg:   16px;   /* cards, CTAs */\n  --radius-xl:   24px;\n  --radius-chip: 11px;\n  --radius-pill: 999px;\n\n  /* Shadows — warm, low, diffuse (never harsh black) */\n  --shadow-sm:  0 1px 2px rgba(8, 19, 46, 0.06);\n  --shadow-md:  0 8px 24px rgba(8, 19, 46, 0.08);\n  --shadow-lg:  0 18px 48px rgba(8, 19, 46, 0.12);\n  --shadow-card: 0 12px 32px rgba(28, 37, 51, 0.10);\n  --shadow-on-dark: 0 20px 60px rgba(0, 0, 0, 0.40);\n\n  /* Motion — gentle, never bouncy */\n  --ease-soft:   cubic-bezier(0.22, 0.61, 0.36, 1); /* @kind other */\n  --dur-fast:    0.2s; /* @kind other */\n  --dur-base:    0.4s; /* @kind other */ /* default color + border fade */\n  --dur-slow:    0.6s; /* @kind other */\n\n  --transition-color: color var(--dur-base) ease,\n                      background-color var(--dur-base) ease,\n                      border-color var(--dur-base) ease;\n\n  /* Glass / overlay */\n  --blur-overlay: blur(8px); /* @kind other */\n\n  /* Dark textured background (navy + concentric rings + grain).\n     Layered radial rings evoke the brand monogram + a sound-wave ripple. */\n  --bg-dark: \n    radial-gradient(120% 90% at 18% 12%, rgba(46,123,175,0.10), transparent 55%),\n    repeating-radial-gradient(circle at 30% 42%, transparent 0 78px,\n      rgba(255,255,255,0.028) 78px 79px, transparent 79px 158px),\n    radial-gradient(140% 120% at 80% 110%, #0c1f3d 0%, var(--vyve-navy-deep) 55%, var(--vyve-navy-900) 100%);\n\n  /* Warm light background wash for cream sections */\n  --bg-cream:\n    radial-gradient(90% 70% at 85% -10%, rgba(250,172,111,0.14), transparent 60%),\n    var(--vyve-cream);\n}\n\n<\u002Fstyle>\n  <script src=\"a6f67059-b0c4-419a-aefd-6865d89d6109\"><\u002Fscript>\n  <style>\n    *, *::before, *::after { box-sizing: border-box; }\n    html, body { margin: 0; padding: 0; }\n    ::selection { background: var(--vyve-peach); color: var(--vyve-navy); }\n    @media (max-width: 860px) {\n      .vyve-nav { padding-left: 20px !important; padding-right: 20px !important; }\n      .vyve-hero { grid-template-columns: 1fr !important; gap: 34px !important; padding: 32px 20px 52px !important; }\n      .vyve-hero-h1 { font-size: clamp(34px, 9vw, 46px) !important; }\n      .vyve-section-pad { padding-left: 20px !important; padding-right: 20px !important; }\n      .vyve-section-y { padding-top: 56px !important; padding-bottom: 56px !important; }\n    }\n    @media (max-width: 520px) {\n      .vyve-book-panel { padding: 22px !important; }\n      .vyve-hero-p { font-size: 17px !important; }\n    }\n    .vyve-team-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(258px, 1fr)); gap: 20px; }\n    .vyve-office-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 22px; }\n    @media (max-width: 720px) { .vyve-office-grid { grid-template-columns: 1fr !important; } }\n    .vyve-team-card { transition: transform var(--dur-base) var(--ease-soft), box-shadow var(--dur-base) var(--ease-soft), border-color var(--dur-base) ease; }\n    .vyve-team-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); border-color: rgba(182,81,0,0.35); }\n    .vyve-team-card:hover .vyve-mono-ring { transform: rotate(-22deg) scale(1.05); }\n    @keyframes vyveHeroIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: none; } }\n    .hero-anim { animation: vyveHeroIn 0.9s var(--ease-soft) 0.1s backwards; }\n    @keyframes vyveReveal { from { opacity: 0; transform: translateY(26px); } to { opacity: 1; transform: none; } }\n    .reveal.is-visible { animation: vyveReveal 0.7s var(--ease-soft) backwards; }\n    @media (prefers-reduced-motion: reduce) { .hero-anim, .reveal.is-visible { animation: none !important; } }\n  <\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"font-family: var(--font-body); background: var(--vyve-navy-deep); background-image: var(--bg-dark); min-height: 100vh; color: var(--text-on-dark);\">\n\n  <!-- ===== HEADER ===== -->\n  <header class=\"vyve-nav\" style=\"position: sticky; top: 0; z-index: 50; height: var(--nav-height); display: flex; align-items: center; justify-content: space-between; padding: 0 var(--section-x); background: rgba(8,19,46,0.55); backdrop-filter: var(--blur-overlay); -webkit-backdrop-filter: var(--blur-overlay); border-bottom: 1px solid var(--border-on-dark);\">\n    <a href=\"#\" style=\"display: flex; align-items: center;\">\n      <img src=\"65303507-87cf-404c-8df8-36690512fd84\" alt=\"Vyve Psychotherapy\" style=\"height: 56px; width: auto; display: block;\">\n    <\u002Fa>\n    <nav style=\"display: flex; align-items: center; gap: 28px;\">\n      <x-import component-from-global-scope=\"VyvePsychotherapyDesignSystem_2ebb49.Button\" variant=\"outlineLight\" size=\"sm\" href=\"#book\" hint-size=\"auto,36px\">Book appointment<\u002Fx-import>\n    <\u002Fnav>\n  <\u002Fheader>\n\n  <!-- ===== HERO ===== -->\n  <section style=\"position: relative; overflow: hidden; background-color: var(--vyve-navy-deep); background-image: url('data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22160%22 height=%22160%22%3E%3Cfilter id=%22n%22%3E%3CfeTurbulence type=%22fractalNoise%22 baseFrequency=%220.9%22 numOctaves=%223%22 stitchTiles=%22stitch%22/%3E%3C/filter%3E%3Crect width=%22100%25%22 height=%22100%25%22 filter=%22url(%23n)%22 opacity=%220.42%22/%3E%3C/svg%3E'), radial-gradient(120% 92% at 13% -8%, rgba(46,123,175,0.22), transparent 52%), radial-gradient(72% 80% at 97% -2%, rgba(182,81,0,0.12), transparent 60%), radial-gradient(150% 135% at 82% 118%, #0d2143 0%, #0a1733 48%, #06112a 100%); background-repeat: repeat, no-repeat, no-repeat, no-repeat; background-size: 150px 150px, auto, auto, auto; background-blend-mode: overlay, normal, normal, normal;\">\n    <!-- ripple ring texture (brand monogram motif) -->\n    <svg viewBox=\"0 0 900 900\" preserveAspectRatio=\"xMaxYMin slice\" aria-hidden=\"true\" style=\"position: absolute; top: -260px; right: -200px; width: 900px; height: 900px; pointer-events: none; opacity: 0.55;\">\n      <g fill=\"none\" stroke=\"rgba(250,172,111,0.16)\">\n        <circle cx=\"450\" cy=\"450\" r=\"120\" stroke-width=\"1.5\"><\u002Fcircle>\n        <circle cx=\"450\" cy=\"450\" r=\"190\" stroke-width=\"1.5\"><\u002Fcircle>\n        <circle cx=\"450\" cy=\"450\" r=\"262\" stroke-width=\"1.25\" stroke=\"rgba(255,255,255,0.10)\"><\u002Fcircle>\n        <circle cx=\"450\" cy=\"450\" r=\"338\" stroke-width=\"1.25\" stroke=\"rgba(255,255,255,0.08)\"><\u002Fcircle>\n        <circle cx=\"450\" cy=\"450\" r=\"418\" stroke-width=\"1\" stroke=\"rgba(255,255,255,0.06)\"><\u002Fcircle>\n      <\u002Fg>\n    <\u002Fsvg>\n    <svg viewBox=\"0 0 760 760\" preserveAspectRatio=\"xMinYMax slice\" aria-hidden=\"true\" style=\"position: absolute; bottom: -340px; left: -240px; width: 760px; height: 760px; pointer-events: none; opacity: 0.5;\">\n      <g fill=\"none\" stroke=\"rgba(46,123,175,0.18)\">\n        <circle cx=\"380\" cy=\"380\" r=\"110\" stroke-width=\"1.5\"><\u002Fcircle>\n        <circle cx=\"380\" cy=\"380\" r=\"186\" stroke-width=\"1.25\" stroke=\"rgba(255,255,255,0.08)\"><\u002Fcircle>\n        <circle cx=\"380\" cy=\"380\" r=\"270\" stroke-width=\"1.25\" stroke=\"rgba(255,255,255,0.06)\"><\u002Fcircle>\n        <circle cx=\"380\" cy=\"380\" r=\"360\" stroke-width=\"1\" stroke=\"rgba(255,255,255,0.05)\"><\u002Fcircle>\n      <\u002Fg>\n    <\u002Fsvg>\n    <div class=\"vyve-hero\" style=\"max-width: var(--site-width); margin: 0 auto; width: 100%; padding: 64px var(--section-x) 88px; display: grid; grid-template-columns: 1.05fr 0.95fr; gap: 64px; align-items: center;\">\n\n    <!-- LEFT: message -->\n    <div>\n      <h1 style=\"margin: 0; font-family: var(--font-display); font-weight: var(--weight-black); color: var(--text-on-dark); font-size: clamp(40px, 5.2vw, 60px); line-height: 0.98; letter-spacing: var(--tracking-h1); text-wrap: balance;\" class=\"vyve-hero-h1 hero-anim\">\n        We don't believe in therapy <span style=\"font-family: var(--font-accent); font-style: italic; font-weight: 700; font-size: 1.32em; line-height: 0.8; color: var(--vyve-peach); padding: 0 0.04em;\">forever<\u002Fspan>.\n      <\u002Fh1>\n\n      <p style=\"color: var(--vyve-cream); font-size: 19px; line-height: 1.6; font-weight: 500; max-width: 460px; margin: 24px 0 0;\" class=\"vyve-hero-p hero-anim\">\n        Real, licensed therapists and measurable progress.<\u002Fp>\n\n      <sc-if value=\"{{ showApproaches }}\" hint-placeholder-val=\"{{ true }}\">\n        <div class=\"hero-anim\" style=\"margin: 32px 0 0;\">\n          <div style=\"display: flex; flex-wrap: wrap; gap: 9px; max-width: 520px;\">\n            <sc-for list=\"{{ approaches }}\" as=\"a\" hint-placeholder-count=\"8\">\n              <span style=\"display: inline-flex; align-items: center; font-size: 13px; font-weight: 600; color: var(--vyve-cream); background: rgba(255,255,255,0.06); border: 1px solid var(--border-on-dark); border-radius: var(--radius-chip); padding: 7px 14px; white-space: nowrap; transition: border-color var(--dur-base) ease, background var(--dur-base) ease;\" style-hover=\"border-color: rgba(250,172,111,0.55); background: rgba(255,255,255,0.10);\">{{ a }}<\u002Fspan>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n\n    <!-- RIGHT: booking panel -->\n    <div id=\"book\" class=\"vyve-book-panel hero-anim\" style=\"background: rgba(255,255,255,0.06); backdrop-filter: var(--blur-overlay); -webkit-backdrop-filter: var(--blur-overlay); border: 1px solid var(--border-on-dark); border-radius: var(--radius-xl); padding: 30px; box-shadow: var(--shadow-on-dark);\">\n      <div style=\"display: flex; align-items: baseline; justify-content: space-between; gap: 12px;\">\n        <h2 style=\"margin: 0; font-family: var(--font-display); font-weight: var(--weight-black); color: var(--vyve-white); font-size: 24px; letter-spacing: -0.4px;\">Book your session<\u002Fh2>\n        <span style=\"font-size: 13px; font-weight: 700; color: var(--vyve-peach); text-transform: uppercase; letter-spacing: 1.4px; white-space: nowrap;\">2 offices<\u002Fspan>\n      <\u002Fdiv>\n      <p style=\"margin: 8px 0 22px; font-size: 14.5px; line-height: 1.5; color: var(--vyve-grey);\">Choose the office closest to you. New patients welcome.<\u002Fp>\n\n      <div style=\"display: flex; flex-direction: column; gap: 14px;\">\n        <sc-for list=\"{{ locations }}\" as=\"loc\" hint-placeholder-count=\"2\">\n          <div style=\"background: rgba(255,255,255,0.05); border: 1px solid var(--border-on-dark); border-radius: var(--radius-lg); padding: 20px; transition: border-color var(--dur-base) ease, transform var(--dur-fast) ease;\" style-hover=\"border-color: rgba(250,172,111,0.55); transform: translateY(-2px);\">\n            <div style=\"display: flex; align-items: center; justify-content: space-between; gap: 10px;\">\n              <span style=\"font-family: var(--font-display); font-weight: var(--weight-black); color: var(--vyve-white); font-size: 19px; letter-spacing: -0.3px;\">{{ loc.city }}<\u002Fspan>\n              <span style=\"font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.2px; color: var(--vyve-peach); border: 1px solid var(--border-on-dark); border-radius: var(--radius-pill); padding: 4px 11px; white-space: nowrap;\">In person<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"margin: 10px 0 0; font-size: 14px; line-height: 1.5; color: var(--vyve-grey);\">{{ loc.addr }}<\u002Fdiv>\n            <a href=\"{{ loc.telHref }}\" style=\"display: inline-block; margin: 6px 0 16px; font-size: 14px; font-weight: 700; color: var(--vyve-peach); text-decoration: none;\">{{ loc.phone }}<\u002Fa>\n            <x-import component-from-global-scope=\"VyvePsychotherapyDesignSystem_2ebb49.Button\" variant=\"accent\" size=\"md\" href=\"{{ loc.book }}\" hint-size=\"100%,44px\" style=\"{{ fullWidthBtn }}\">{{ loc.cta }}<\u002Fx-import>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <sc-if value=\"{{ showVirtualOption }}\" hint-placeholder-val=\"{{ true }}\">\n        <a href=\"#\" style=\"display: flex; align-items: center; justify-content: space-between; gap: 10px; margin: 16px 0 0; padding: 14px 18px; border-radius: var(--radius-lg); background: transparent; border: 1px dashed var(--border-on-dark); text-decoration: none; transition: background var(--dur-base) ease;\" style-hover=\"background: rgba(255,255,255,0.05);\">\n          <span style=\"font-size: 14px; font-weight: 600; color: var(--vyve-cream);\">Prefer to meet online? Virtual counselling across NB.<\u002Fspan>\n          <span style=\"color: var(--vyve-peach); font-weight: 800; font-size: 16px;\">→<\u002Fspan>\n        <\u002Fa>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== TEAM DIRECTORY (photo-free) ===== -->\n  <section style=\"background: var(--vyve-cream); background-image: var(--bg-cream); color: var(--text-body);\">\n    <div class=\"vyve-section-pad vyve-section-y\" style=\"max-width: var(--site-width); margin: 0 auto; padding: var(--section-y) var(--section-x);\">\n\n      <div class=\"reveal\" style=\"display: flex; align-items: flex-end; justify-content: space-between; gap: 28px; flex-wrap: wrap; margin: 0 0 44px;\">\n        <div style=\"max-width: 620px;\">\n          <span style=\"display: inline-block; text-transform: uppercase; letter-spacing: 2px; font-size: 12px; font-weight: 800; color: var(--vyve-orange);\">Our team · Notre équipe<\u002Fspan>\n          <h2 style=\"margin: 16px 0 0; font-family: var(--font-display); font-weight: var(--weight-black); color: var(--text-heading); font-size: clamp(30px, 4vw, 44px); line-height: 0.98; letter-spacing: var(--tracking-h2); text-wrap: balance;\">\n            Find the therapist that's <span style=\"font-family: var(--font-accent); font-style: italic; font-weight: 700; font-size: 1.32em; line-height: 0.8; color: var(--vyve-orange); padding: 0 0.04em;\">right<\u002Fspan> for you.\n          <\u002Fh2>\n          <p style=\"margin: 18px 0 0; font-size: 17px; line-height: 1.6; color: var(--text-muted); max-width: 560px;\">\n            A full team of licensed counselling therapists, social workers and psychologists across our two New Brunswick offices. Browse their credentials and approaches, then book with the person who feels like the right fit.\n          <\u002Fp>\n        <\u002Fdiv>\n        <div style=\"display: flex; align-items: center; gap: 10px; padding: 12px 18px; border: 1px solid var(--border-soft); border-radius: var(--radius-pill); background: var(--vyve-white); box-shadow: var(--shadow-sm);\">\n          <span style=\"font-family: var(--font-display); font-weight: var(--weight-black); font-size: 26px; color: var(--vyve-orange); letter-spacing: -0.5px;\">{{ teamCount }}<\u002Fspan>\n          <span style=\"font-size: 13.5px; font-weight: 600; line-height: 1.25; color: var(--text-muted);\">therapists<br>ready to help<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"vyve-team-grid\">\n        <sc-for list=\"{{ team }}\" as=\"t\" hint-placeholder-count=\"8\">\n          <a href=\"#book\" class=\"vyve-team-card reveal\" style=\"display: flex; flex-direction: column; text-decoration: none; background: var(--vyve-white); border: 1px solid var(--border-soft); border-radius: var(--radius-lg); box-shadow: var(--shadow-card); padding: 24px 22px 22px;\">\n            <div style=\"display: flex; align-items: center; justify-content: space-between; gap: 12px;\">\n              <!-- monogram -->\n              <div style=\"position: relative; width: 66px; height: 66px; flex: 0 0 auto; display: grid; place-items: center; border-radius: 50%; background: radial-gradient(120% 120% at 30% 25%, var(--vyve-peach-tint), var(--vyve-sand));\">\n                <svg class=\"vyve-mono-ring\" viewBox=\"0 0 66 66\" width=\"66\" height=\"66\" style=\"position: absolute; inset: 0; transition: transform var(--dur-base) var(--ease-soft); transform: rotate(-22deg);\" aria-hidden=\"true\">\n                  <circle cx=\"33\" cy=\"33\" r=\"27\" fill=\"none\" stroke=\"rgba(182,81,0,0.30)\" stroke-width=\"2\"><\u002Fcircle>\n                  <ellipse cx=\"33\" cy=\"33\" rx=\"13\" ry=\"27\" fill=\"none\" stroke=\"rgba(182,81,0,0.45)\" stroke-width=\"2\"><\u002Fellipse>\n                <\u002Fsvg>\n                <span style=\"position: relative; font-family: var(--font-accent); font-style: italic; font-weight: 700; font-size: 27px; line-height: 1; color: var(--vyve-orange);\">{{ t.initials }}<\u002Fspan>\n              <\u002Fdiv>\n              <span style=\"font-size: 10.5px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; color: var(--vyve-slate); border: 1px solid var(--border-soft); border-radius: var(--radius-pill); padding: 5px 10px; white-space: nowrap;\">{{ t.office }}<\u002Fspan>\n            <\u002Fdiv>\n\n            <div style=\"margin: 18px 0 0;\">\n              <div style=\"font-family: var(--font-display); font-weight: var(--weight-black); font-size: 20px; letter-spacing: -0.4px; color: var(--vyve-navy); line-height: 1.1;\">{{ t.name }}<\u002Fdiv>\n              <sc-if value=\"{{ t.role }}\" hint-placeholder-val=\"Licensed Counselling Therapist\">\n                <div style=\"margin: 5px 0 0; font-size: 13.5px; font-weight: 600; line-height: 1.4; color: var(--vyve-orange-600);\">{{ t.role }}<\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n\n            <div style=\"margin: 16px 0 0; padding: 14px 0 0; border-top: 1px solid var(--border-soft); display: flex; align-items: center; justify-content: space-between; gap: 10px;\">\n              <span style=\"font-size: 12.5px; font-weight: 600; color: var(--text-muted);\">{{ t.modality }}<\u002Fspan>\n              <span style=\"font-size: 13px; font-weight: 800; color: var(--vyve-orange); display: inline-flex; align-items: center; gap: 6px;\">Book →<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fa>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== OFFICES BAND ===== -->\n  <section style=\"background: var(--vyve-sand); color: var(--text-body);\">\n    <div class=\"vyve-section-pad\" style=\"max-width: var(--site-width); margin: 0 auto; padding: 64px var(--section-x);\">\n      <div class=\"reveal\" style=\"margin: 0 0 26px;\">\n        <h3 style=\"margin: 0; font-family: var(--font-display); font-weight: var(--weight-black); color: var(--text-heading); font-size: clamp(24px, 3vw, 32px); letter-spacing: -0.6px;\">\n          Two offices, both <span style=\"font-family: var(--font-accent); font-style: italic; font-weight: 700; font-size: 1.3em; color: var(--vyve-orange);\">close<\u002Fspan> to home.<\u002Fh3>\n      <\u002Fdiv>\n      <div class=\"vyve-office-grid reveal\">\n        <sc-for list=\"{{ locations }}\" as=\"office\" hint-placeholder-count=\"2\">\n          <div style=\"background: var(--vyve-white); border: 1px solid var(--border-soft); border-radius: var(--radius-lg); box-shadow: var(--shadow-card); padding: 28px 28px 26px; display: flex; flex-direction: column;\">\n            <div style=\"display: flex; align-items: center; gap: 12px;\">\n              <h4 style=\"margin: 0; font-family: var(--font-display); font-weight: var(--weight-black); color: var(--text-heading); font-size: 26px; letter-spacing: -0.5px;\">{{ office.city }}<\u002Fh4>\n              <span style=\"font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.2px; color: var(--vyve-orange); border: 1px solid var(--vyve-orange); border-radius: var(--radius-pill); padding: 4px 11px; white-space: nowrap;\">In-person office<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"margin: 12px 0 0; font-size: 15px; line-height: 1.5; color: var(--text-muted);\">{{ office.addr }}<\u002Fdiv>\n            <a href=\"{{ office.telHref }}\" style=\"display: inline-block; margin: 6px 0 22px; font-size: 15px; font-weight: 700; color: var(--vyve-orange); text-decoration: none;\">{{ office.phone }}<\u002Fa>\n            <div style=\"margin-top: auto;\">\n              <x-import component-from-global-scope=\"VyvePsychotherapyDesignSystem_2ebb49.Button\" variant=\"primary\" size=\"md\" href=\"{{ office.book }}\" hint-size=\"auto,44px\">{{ office.cta }}<\u002Fx-import>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== CLOSING CONTACT BAR ===== -->\n  <section style=\"background: var(--vyve-navy-deep); background-image: var(--bg-dark); border-top: 1px solid var(--border-on-dark);\">\n    <div class=\"vyve-section-pad reveal\" style=\"max-width: var(--site-width); margin: 0 auto; padding: 26px var(--section-x); display: flex; align-items: center; justify-content: space-between; gap: 24px; flex-wrap: wrap;\">\n      <span style=\"font-family: var(--font-display); font-weight: var(--weight-black); color: var(--vyve-white); font-size: 18px; letter-spacing: -0.3px;\">Whatever you're facing, we're here to <span style=\"font-family: var(--font-accent); font-style: italic; font-weight: 700; font-size: 1.3em; color: var(--vyve-peach);\">help<\u002Fspan>.<\u002Fspan>\n      <div style=\"display: flex; align-items: center; gap: 28px; flex-wrap: wrap;\">\n        <sc-for list=\"{{ locations }}\" as=\"loc\" hint-placeholder-count=\"2\">\n          <a href=\"{{ loc.telHref }}\" style=\"display: inline-flex; align-items: center; gap: 9px; font-size: 14px; font-weight: 600; color: var(--vyve-grey); text-decoration: none;\" style-hover=\"color: var(--vyve-peach);\"><span style=\"font-weight: 800; color: var(--vyve-cream);\">{{ loc.city }}<\u002Fspan> {{ loc.phone }}<\u002Fa>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n<\u002Fdiv>\n\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1280,&quot;height&quot;:900},&quot;showApproaches&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Hero&quot;},&quot;showVirtualOption&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Hero&quot;}}\">\nclass Component extends DCLogic {\n  componentDidMount() {\n    this._reveal = () => {\n      const vh = window.innerHeight || document.documentElement.clientHeight;\n      document.querySelectorAll(\".reveal:not(.is-visible)\").forEach((el) => {\n        const r = el.getBoundingClientRect();\n        if (r.top < vh * 0.9 && r.bottom > 0) el.classList.add(\"is-visible\");\n      });\n    };\n    this._reveal();\n    window.addEventListener(\"scroll\", this._reveal, { passive: true });\n    window.addEventListener(\"resize\", this._reveal);\n    this._t1 = se
